name: Fetch and notify

on:
  schedule:
    # 重点: JST 水曜 7:03, 7:11, 7:20, 7:33 (UTC 火曜 22:xx)。
    # 新着エピソードは水曜7:00公開のため、4発撃って遅延・スキップに耐える。
    # GitHub Actionsの混雑分(:00,:05,:15,:30,:45)は避ける。
    - cron: "3,11,20,33 22 * * 2"
    # 平常: 6時間ごとの保険。JST 9:13, 15:13, 21:13, 3:13。
    - cron: "13 */6 * * *"
  workflow_dispatch:

jobs:
  fetch_and_notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4
      - name: Run script
        run: ruby app.rb
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      - name: Save progress
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Save progress"
          commit_options: "--no-verify --signoff"
